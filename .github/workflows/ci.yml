name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whitespace
        run: git diff --check

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, fileinfo, curl, dom, xml, bcmath, zip
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: backend

      - name: Prepare test environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --force
          php artisan config:clear
        env:
          APP_ENV: testing
          APP_DEBUG: true
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/backend/database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          TELEGRAM_ENABLED: "false"
          TELEGRAM_SANDBOX_MODE: "true"
          PAYMENT_SANDBOX_MODE: "true"
          BAKONG_KHQR_ENABLED: "false"

      - name: Run backend tests
        run: php artisan test --parallel
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          TELEGRAM_ENABLED: "false"
          TELEGRAM_SANDBOX_MODE: "true"
          PAYMENT_SANDBOX_MODE: "true"
          BAKONG_KHQR_ENABLED: "false"

      - name: List routes
        run: php artisan route:list
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/backend/database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  frontend:
    name: Frontend ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, test, build]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run ${{ matrix.task }}
        run: npm run ${{ matrix.task }}
