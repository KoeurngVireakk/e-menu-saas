# MenuDIGI production Docker template.
# Copy to docker-compose.production.yml and provide real .env values.
# This is an example, not a verified one-command deployment for every host.

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend.example
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend-storage:/var/www/backend/storage

  queue:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend.example
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - backend
      - redis
    volumes:
      - backend-storage:/var/www/backend/storage

  scheduler:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend.example
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    command: php artisan schedule:work
    depends_on:
      - backend
      - redis
    volumes:
      - backend-storage:/var/www/backend/storage

  reverb:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend.example
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    command: php artisan reverb:start --host=0.0.0.0 --port=${REVERB_SERVER_PORT:-8080}
    ports:
      - "${REVERB_PUBLIC_PORT:-8080}:8080"
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend.example
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_STORAGE_URL: ${VITE_STORAGE_URL}
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLIC_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  backend-storage:
